services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  backend:
    image: ghcr.io/${IMAGE_NAMESPACE}/cardiotrack-backend:latest
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/cardiotrack
    depends_on:
      - mongo
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    image: ghcr.io/${IMAGE_NAMESPACE}/cardiotrack-frontend:latest
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend

volumes:
  mongo_data:
  backend_uploads:
  caddy_data:
  caddy_config: